name: watch

on:
  schedule:
    - cron: "3,13,23,33,43,53 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: watch
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run watcher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python watcher.py

      - name: Commit updated state
        run: |
          if [[ -n "$(git status --porcelain seen_events.json)" ]]; then
            git config user.name  "btb-watcher-bot"
            git config user.email "btb-watcher-bot@users.noreply.github.com"
            git add seen_events.json
            git commit -m "chore: update seen events"
            git push
          else
            echo "No state changes."
          fi
